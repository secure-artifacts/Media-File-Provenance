name: Secure Release (PyInstaller)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  id-token: write
  contents: write
  attestations: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Resolve version
        id: meta
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          VERSION="${VERSION#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install exiftool on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Try to use local exiftool.exe if available
          if (Test-Path "exiftool.exe") {
            $exiftoolPath = "$(Get-Item exiftool.exe | Select-Object -ExpandProperty FullName)"
            Write-Host "Using local exiftool: $exiftoolPath"
          } else {
            Write-Host "Local exiftool not found, installing via Chocolatey..."
            choco install exiftool -y --no-progress
            
            # Wait a moment for the installation to complete
            Start-Sleep -Seconds 2
            
            # Try multiple methods to find exiftool
            $exiftoolPath = $null
            
            # Method 1: Get-Command
            try {
              $cmd = Get-Command exiftool.exe -ErrorAction SilentlyContinue
              if ($cmd) {
                $exiftoolPath = $cmd.Source
                Write-Host "Found exiftool via Get-Command: $exiftoolPath"
              }
            } catch {}
            
            # Method 2: Check common Chocolatey install location
            if (-not $exiftoolPath) {
              $chocoPath = "C:\ProgramData\chocolatey\bin\exiftool.exe"
              if (Test-Path $chocoPath) {
                $exiftoolPath = $chocoPath
                Write-Host "Found exiftool in Chocolatey path: $exiftoolPath"
              }
            }
            
            # Method 3: Check Program Files
            if (-not $exiftoolPath) {
              $progPath = Get-ChildItem -Path "C:\Program Files*" -Filter "exiftool.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1 | ForEach-Object { $_.FullName }
              if ($progPath) {
                $exiftoolPath = $progPath
                Write-Host "Found exiftool in Program Files: $exiftoolPath"
              }
            }
            
            # If still not found, use fallback
            if (-not $exiftoolPath) {
              Write-Host "WARNING: Could not find exiftool, will use fallback method"
              $exiftoolPath = "exiftool.exe"
            }
          }
          
          # Set environment variable
          "EXIFTOOL_PATH=$exiftoolPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "EXIFTOOL_PATH set to: $exiftoolPath"

      - name: Install exiftool on macOS
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install exiftool
          echo "EXIFTOOL_PATH=$(command -v exiftool)" >> "$GITHUB_ENV"

      - name: Prepare app icon on macOS
        if: runner.os == 'macOS'
        run: |
          if [ -f "ico.ico" ]; then
            python -c "from PIL import Image; Image.open('ico.ico').save('ico.icns'); print('Converted ico.ico -> ico.icns')"
          fi

      - name: Build app on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "EXIFTOOL_PATH from env: $env:EXIFTOOL_PATH"
          Write-Host "Current directory: $(Get-Location)"
          
          # Verify Python and PyInstaller are available
          python --version
          python -m PyInstaller --version
          
          # Run PyInstaller with proper error handling
          $pyinstallerCmd = @(
            "python",
            "-m",
            "PyInstaller",
            "--noconfirm",
            "--clean",
            "--windowed",
            "--name=MAMDesktop",
            "--collect-all=PyQt6",
            "--collect-all=cv2",
            "--collect-all=imagehash",
            "--hidden-import=pymysql",
            "--hidden-import=piexif",
            "--hidden-import=mutagen.mp4"
          )

          if (Test-Path "ico.ico") {
            $pyinstallerCmd += "--icon=ico.ico"
            $pyinstallerCmd += "--add-data=ico.ico;."
            Write-Host "Using app icon: ico.ico"
          } else {
            Write-Host "WARNING: ico.ico not found, building without custom icon"
          }
          
          # Add exiftool binary if available
          if ($env:EXIFTOOL_PATH -and (Test-Path $env:EXIFTOOL_PATH)) {
            $pyinstallerCmd += "--add-binary=$($env:EXIFTOOL_PATH);."
            Write-Host "Adding exiftool: $($env:EXIFTOOL_PATH)"
          } else {
            Write-Host "WARNING: EXIFTOOL_PATH not set or file not found, skipping exiftool binary"
          }
          
          $pyinstallerCmd += "mam_gui.py"
          
          # Run PyInstaller
          & $pyinstallerCmd[0] @($pyinstallerCmd | Select-Object -Skip 1)
          
          if ($LASTEXITCODE -ne 0) {
            Write-Host "✗ ERROR: PyInstaller failed with exit code $LASTEXITCODE"
            exit 1
          }
          
          Write-Host "Checking PyInstaller output..."
          if (Test-Path "dist\MAMDesktop") {
            Write-Host "✓ dist\MAMDesktop exists"
            $fileCount = (Get-ChildItem -Path "dist\MAMDesktop" -Recurse | Measure-Object).Count
            Write-Host "  Files count: $fileCount"
            
            # Verify exe exists
            if (Test-Path "dist\MAMDesktop\MAMDesktop.exe") {
              Write-Host "✓ dist\MAMDesktop\MAMDesktop.exe exists"
            } else {
              Write-Host "✗ ERROR: MAMDesktop.exe not found!"
              exit 1
            }
          } else {
            Write-Host "✗ ERROR: dist\MAMDesktop not found!"
            Write-Host "Directory listing:"
            Get-ChildItem -Path "dist" -ErrorAction Ignore | ForEach-Object { Write-Host "  Found: $_" }
            exit 1
          }

      - name: Build app on macOS
        if: runner.os == 'macOS'
        run: |
          ICON_ARGS=()
          if [ -f "ico.icns" ]; then
            ICON_ARGS+=(--icon "ico.icns")
            echo "Using app icon: ico.icns"
          elif [ -f "ico.ico" ]; then
            ICON_ARGS+=(--add-data "ico.ico:.")
            echo "No .icns found, packaging ico.ico as data"
          fi

          pyinstaller --noconfirm --clean --windowed --name MAMDesktop \
            --collect-all PyQt6 \
            --collect-all cv2 \
            --collect-all imagehash \
            --hidden-import pymysql \
            --hidden-import piexif \
            --hidden-import mutagen.mp4 \
            "${ICON_ARGS[@]}" \
            --add-binary "${EXIFTOOL_PATH}:." \
            mam_gui.py
          
          echo "Checking PyInstaller output..."
          if [ -d "dist/MAMDesktop.app" ]; then
            echo "✓ dist/MAMDesktop.app exists"
            find dist/MAMDesktop.app | wc -l | xargs echo "  Files count:"
          else
            echo "✗ ERROR: dist/MAMDesktop.app not found!"
            ls -la dist/ || true
            exit 1
          fi

      - name: Create Windows installer (.exe)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          New-Item -ItemType Directory -Force release | Out-Null
          New-Item -ItemType Directory -Force packaging/windows | Out-Null
          
          # Verify dist\MAMDesktop exists before compilation
          if (-not (Test-Path "dist\MAMDesktop")) {
            Write-Host "ERROR: dist\MAMDesktop not found!"
            Write-Host "Current directory:"
            Get-Location
            Write-Host "Directory listing:"
            Get-ChildItem -Path "dist" -ErrorAction Ignore | ForEach-Object { Write-Host "  $_" }
            exit 1
          }

          $iss = @(
            '[Setup]',
            'AppName=MAM Desktop',
            'AppVersion={#MyAppVersion}',
            'DefaultDirName={autopf}\MAMDesktop',
            'DefaultGroupName=MAM Desktop',
            'OutputDir=..\..\release',
            'OutputBaseFilename=MAMDesktop-Installer-{#MyAppVersion}-win64',
            'Compression=lzma',
            'SolidCompression=yes',
            'ArchitecturesAllowed=x64compatible',
            'ArchitecturesInstallIn64BitMode=x64compatible',
            'WizardStyle=modern',
            'SetupIconFile=..\..\ico.ico',
            'UninstallDisplayIcon={app}\MAMDesktop.exe',
            '',
            '[Tasks]',
            'Name: "desktopicon"; Description: "Create a desktop shortcut"; GroupDescription: "Additional icons"',
            '',
            '[Files]',
            'Source: "..\..\dist\MAMDesktop\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs',
            'Source: "..\..\ico.ico"; DestDir: "{app}"; Flags: ignoreversion',
            'Source: "..\..\README.md"; DestDir: "{app}"; Flags: ignoreversion',
            'Source: "..\..\QUICK_START.md"; DestDir: "{app}"; Flags: ignoreversion',
            'Source: "..\..\API_REFERENCE.md"; DestDir: "{app}"; Flags: ignoreversion',
            'Source: "..\..\CHANGELOG.md"; DestDir: "{app}"; Flags: ignoreversion',
            '',
            '[Icons]',
            'Name: "{autoprograms}\MAM Desktop"; Filename: "{app}\MAMDesktop.exe"',
            'Name: "{autodesktop}\MAM Desktop"; Filename: "{app}\MAMDesktop.exe"; Tasks: desktopicon',
            '',
            '[Run]',
            'Filename: "{app}\MAMDesktop.exe"; Description: "Launch MAM Desktop"; Flags: nowait postinstall skipifsilent'
          )
          $iss | Set-Content -Path packaging/windows/mam_installer.iss -Encoding UTF8

          $version = '${{ steps.meta.outputs.version }}'
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DMyAppVersion=$version" "packaging/windows/mam_installer.iss"

      - name: Create macOS installer (.pkg/.dmg)
        if: runner.os == 'macOS'
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          rm -rf pkgroot release
          mkdir -p pkgroot/Applications release
          cp -R dist/MAMDesktop.app pkgroot/Applications/

          pkgbuild \
            --root pkgroot \
            --identifier com.nuosishizi.mamdesktop \
            --version "$VERSION" \
            --install-location "/" \
            "release/MAMDesktop-Installer-${VERSION}-macos.pkg"

          mkdir -p dmgroot
          cp -R dist/MAMDesktop.app dmgroot/
          ln -s /Applications dmgroot/Applications
          hdiutil create -volname "MAM Desktop" -srcfolder dmgroot -ov -format UDZO "release/MAMDesktop-${VERSION}-macos.dmg"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "release/*"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ runner.os }}
          path: release/*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
