name: Build Desktop Installers

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build on ${{ matrix.artifact_suffix }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_suffix: Windows
            package_suffix: win64
          - os: macos-latest
            artifact_suffix: macOS
            package_suffix: macos
          - os: macos-15-intel
            artifact_suffix: macOS-Intel
            package_suffix: macos-intel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Resolve version
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="dev-${GITHUB_RUN_NUMBER}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller flask flask-cors werkzeug

      - name: Install exiftool on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Try to use local exiftool.exe if available
          if (Test-Path "exiftool.exe") {
            $exiftoolPath = "$(Get-Item exiftool.exe | Select-Object -ExpandProperty FullName)"
            Write-Host "Using local exiftool: $exiftoolPath"
          } else {
            Write-Host "Local exiftool not found, installing via Chocolatey..."
            choco install exiftool -y --no-progress

            # Wait a moment for the installation to complete
            Start-Sleep -Seconds 2

            # Try multiple methods to find exiftool
            $exiftoolPath = $null

            # Method 1: Check real Chocolatey lib location (avoid shims in bin)
            if (-not $exiftoolPath) {
              $chocoLibPath = "C:\ProgramData\chocolatey\lib\exiftool\tools\exiftool.exe"
              if (Test-Path $chocoLibPath) {
                $exiftoolPath = $chocoLibPath
                Write-Host "Found real exiftool in Chocolatey lib path: $exiftoolPath"
              }
            }

            # Method 2: Get-Command (may need PATH refresh after choco)
            try {
              if (-not $exiftoolPath) {
                $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
                $cmd = Get-Command exiftool.exe -ErrorAction SilentlyContinue
                if ($cmd -and $cmd.Source -notmatch "chocolatey\\bin") {
                  $exiftoolPath = $cmd.Source
                  Write-Host "Found exiftool via Get-Command: $exiftoolPath"
                }
              }
            } catch {}

            # Method 3: Check Program Files
            if (-not $exiftoolPath) {
              $progPath = Get-ChildItem -Path "C:\Program Files*" -Filter "exiftool.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1 | ForEach-Object { $_.FullName }
              if ($progPath) {
                $exiftoolPath = $progPath
                Write-Host "Found exiftool in Program Files: $exiftoolPath"
              }
            }

            # If still not found, fail with a clear message
            if (-not $exiftoolPath) {
              Write-Host "ERROR: Could not find exiftool.exe after installation attempt."
              Write-Host "Chocolatey bin dir contents:"
              Get-ChildItem "C:\ProgramData\chocolatey\bin\" -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "  $($_.Name)" }
              exit 1
            }
          }

          # Set environment variable
          "EXIFTOOL_PATH=$exiftoolPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "EXIFTOOL_PATH set to: $exiftoolPath"

      - name: Install exiftool on macOS
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install exiftool
          echo "EXIFTOOL_PATH=$(command -v exiftool)" >> "$GITHUB_ENV"

      - name: Prepare app icon on macOS
        if: runner.os == 'macOS'
        run: |
          if [ -f "ico.ico" ]; then
            python -c "from PIL import Image; Image.open('ico.ico').save('ico.icns'); print('Converted ico.ico -> ico.icns')"
          fi

      - name: Build app on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $cmd = @(
            "pyinstaller",
            "--noconfirm",
            "--clean",
            "--windowed",
            "--name", "MAMDesktop",
            "--collect-all", "PyQt6",
            "--collect-all", "cv2",
            "--collect-all", "imagehash",
            "--hidden-import", "requests",
            "--hidden-import", "piexif",
            "--hidden-import", "mutagen.mp4",
            "--hidden-import", "flask",
            "--hidden-import", "flask_cors",
            "--add-data", "canvatools_dist;canvatools_dist"
          )

          if (Test-Path "ico.ico") {
            $cmd += @("--icon", "ico.ico")
            $cmd += @("--add-data", "ico.ico;.")
            Write-Host "Using app icon: ico.ico"
          } else {
            Write-Host "WARNING: ico.ico not found, building without custom icon"
          }

          $cmd += @("--add-binary", "$env:EXIFTOOL_PATH;.", "mam_gui.py")
          & $cmd[0] @($cmd | Select-Object -Skip 1)

      - name: Build app on macOS
        if: runner.os == 'macOS'
        run: |
          ICON_ARGS=()
          if [ -f "ico.icns" ]; then
            ICON_ARGS+=(--icon "ico.icns")
            echo "Using app icon: ico.icns"
          elif [ -f "ico.ico" ]; then
            ICON_ARGS+=(--add-data "ico.ico:.")
            echo "No .icns found, packaging ico.ico as data"
          fi

          pyinstaller --noconfirm --clean --windowed --name MAMDesktop \
            --collect-all PyQt6 \
            --collect-all cv2 \
            --collect-all imagehash \
            --hidden-import requests \
            --hidden-import piexif \
            --hidden-import mutagen.mp4 \
            --hidden-import flask \
            --hidden-import flask_cors \
            --add-data "canvatools_dist:canvatools_dist" \
            "${ICON_ARGS[@]}" \
            --add-binary "${EXIFTOOL_PATH}:." \
            mam_gui.py

      - name: Create Windows installer (.exe)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          New-Item -ItemType Directory -Force release | Out-Null
          New-Item -ItemType Directory -Force packaging/windows | Out-Null

          $iss = @(
            '[Setup]',
            'AppName=MAM Desktop',
            'AppVersion={#MyAppVersion}',
            'DefaultDirName={autopf}\MAMDesktop',
            'DefaultGroupName=MAM Desktop',
            'OutputDir=..\..\release',
            'OutputBaseFilename=MAMDesktop-Installer-{#MyAppVersion}-${{ matrix.package_suffix }}',
            'Compression=lzma',
            'SolidCompression=yes',
            'ArchitecturesAllowed=x64compatible',
            'ArchitecturesInstallIn64BitMode=x64compatible',
            'WizardStyle=modern',
            'SetupIconFile=..\..\ico.ico',
            'UninstallDisplayIcon={app}\MAMDesktop.exe',
            '',
            '[Tasks]',
            'Name: "desktopicon"; Description: "Create a desktop shortcut"; GroupDescription: "Additional icons"',
            '',
            '[Files]',
            'Source: "..\..\dist\MAMDesktop\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs',
            'Source: "..\..\ico.ico"; DestDir: "{app}"; Flags: ignoreversion',
            'Source: "..\..\README.md"; DestDir: "{app}"; Flags: ignoreversion',
            'Source: "..\..\QUICK_START.md"; DestDir: "{app}"; Flags: ignoreversion',
            'Source: "..\..\API_REFERENCE.md"; DestDir: "{app}"; Flags: ignoreversion',
            'Source: "..\..\CHANGELOG.md"; DestDir: "{app}"; Flags: ignoreversion',
            '',
            '[Icons]',
            'Name: "{autoprograms}\MAM Desktop"; Filename: "{app}\MAMDesktop.exe"',
            'Name: "{autodesktop}\MAM Desktop"; Filename: "{app}\MAMDesktop.exe"; Tasks: desktopicon',
            '',
            '[Run]',
            'Filename: "{app}\MAMDesktop.exe"; Description: "Launch MAM Desktop"; Flags: nowait postinstall skipifsilent'
          )
          $iss | Set-Content -Path packaging/windows/mam_installer.iss -Encoding UTF8

          $version = '${{ steps.meta.outputs.version }}'
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DMyAppVersion=$version" "packaging/windows/mam_installer.iss"

      - name: Create macOS installer (.pkg)
        if: runner.os == 'macOS'
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          rm -rf pkgroot release
          mkdir -p pkgroot/Applications release
          cp -R dist/MAMDesktop.app pkgroot/Applications/

          pkgbuild \
            --root pkgroot \
            --identifier com.nuosishizi.mamdesktop \
            --version "$VERSION" \
            --install-location "/" \
            "release/MAMDesktop-Installer-${VERSION}-${{ matrix.package_suffix }}.pkg"

          mkdir -p dmgroot
          cp -R dist/MAMDesktop.app dmgroot/
          ln -s /Applications dmgroot/Applications
          hdiutil create -volname "MAM Desktop" -srcfolder dmgroot -ov -format UDZO "release/MAMDesktop-${VERSION}-${{ matrix.package_suffix }}.dmg"

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MAMDesktop-${{ matrix.artifact_suffix }}
          path: release/**
          if-no-files-found: error
