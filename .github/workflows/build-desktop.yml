name: Build Desktop Packages

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build app on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean --windowed --name MAMDesktop `
            --collect-all PyQt6 `
            --collect-all cv2 `
            --collect-all imagehash `
            --hidden-import pymysql `
            --hidden-import piexif `
            --hidden-import mutagen.mp4 `
            mam_gui.py

          New-Item -ItemType Directory -Force release | Out-Null
          Copy-Item dist/MAMDesktop.exe release/
          Copy-Item README.md,QUICK_START.md,API_REFERENCE.md,CHANGELOG.md release/ -ErrorAction SilentlyContinue
          if (Test-Path exiftool.exe) {
            Copy-Item exiftool.exe release/
          }

      - name: Build app on macOS
        if: runner.os == 'macOS'
        run: |
          pyinstaller --noconfirm --clean --windowed --name MAMDesktop \
            --collect-all PyQt6 \
            --collect-all cv2 \
            --collect-all imagehash \
            --hidden-import pymysql \
            --hidden-import piexif \
            --hidden-import mutagen.mp4 \
            mam_gui.py

          mkdir -p release
          cp -R dist/MAMDesktop.app release/
          cp README.md QUICK_START.md API_REFERENCE.md CHANGELOG.md release/ || true

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: MAMDesktop-${{ runner.os }}
          path: release/**
          if-no-files-found: error
